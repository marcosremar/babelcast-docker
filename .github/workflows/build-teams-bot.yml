name: Build meet-teams-bot

on:
  push:
    branches: [main]
    paths:
      - 'teams-bot/Dockerfile'
      - '.github/workflows/build-teams-bot.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo (Dockerfile)
        uses: actions/checkout@v4

      - name: Checkout private repo (teams-bot source code)
        uses: actions/checkout@v4
        with:
          repository: marcosremar/babelcast
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: teams-bot
          sparse-checkout-cone-mode: true
          path: _private

      - name: Place source code alongside Dockerfile
        run: |
          # Copy all source files (except Dockerfile which is already in public repo)
          rsync -a --exclude='Dockerfile' _private/teams-bot/ teams-bot/
          rm -rf _private

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push meet-teams-bot
        uses: docker/build-push-action@v6
        with:
          context: teams-bot
          file: teams-bot/Dockerfile
          push: true
          tags: |
            marcosremar/meet-teams-bot:latest
            marcosremar/meet-teams-bot:${{ github.sha }}
          cache-from: type=gha,scope=meet-teams-bot
          cache-to: type=gha,mode=max,scope=meet-teams-bot
