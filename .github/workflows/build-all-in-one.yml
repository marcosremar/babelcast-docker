name: Build all-in-one

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile.all-in-one'
      - 'docker/start-all-in-one.sh'
      - 'docker/all-in-one/**'
      - 'teams-bot/Dockerfile'
      - '.github/workflows/build-all-in-one.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private repo (api/ + teams-bot/ source)
        uses: actions/checkout@v4
        with:
          repository: marcosremar/babelcast
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            docker/api
            teams-bot
          sparse-checkout-cone-mode: false
          path: _private

      - name: Place private source code
        run: |
          # Pipeline API code
          cp -r _private/docker/api docker/api
          # Bot source (excluding Dockerfile — public repo has it)
          rsync -a --exclude='Dockerfile' _private/teams-bot/ teams-bot/
          rm -rf _private

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push babelcast-all-in-one
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.all-in-one
          push: true
          tags: |
            marcosremar/babelcast-all-in-one:latest
            marcosremar/babelcast-all-in-one:${{ github.sha }}
          cache-from: type=gha,scope=babelcast-all-in-one
          cache-to: type=gha,mode=max,scope=babelcast-all-in-one
