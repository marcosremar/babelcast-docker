name: Build BabelCast Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'teams-bot/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: marcosremar/babelcast-translategemma
            dockerfile: docker/Dockerfile
            name: babelcast-translategemma
            build_args: CONF_LLM_MODEL=translategemma
          - image: marcosremar/babelcast-mistral
            dockerfile: docker/Dockerfile
            name: babelcast-mistral
            build_args: CONF_LLM_MODEL=mistral
          - image: marcosremar/babelcast-groq
            dockerfile: docker/Dockerfile.groq
            name: babelcast-groq
          - image: marcosremar/babelcast-qwen3-tts
            dockerfile: docker/Dockerfile.tts
            name: qwen3-tts
          - image: marcosremar/meet-teams-bot
            dockerfile: teams-bot/Dockerfile
            name: meet-teams-bot
            context: teams-bot
    steps:
      - name: Checkout public repo (Dockerfiles)
        uses: actions/checkout@v4

      - name: Checkout private repo (api/ source code)
        uses: actions/checkout@v4
        with:
          repository: marcosremar/babelcast
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: docker/api
          sparse-checkout-cone-mode: false
          path: _private

      - name: Place api/ code alongside Dockerfiles
        run: mv _private/docker/api docker/api

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift \
            /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/.ghcup /opt/az /usr/share/miniconda /usr/local/go \
            /usr/local/julia* /usr/local/sqlpackage \
            /opt/microsoft /usr/local/aws-cli
          sudo apt-get purge -y -qq firefox google-chrome-stable \
            microsoft-edge-stable dotnet* aspnetcore* 2>/dev/null || true
          sudo apt-get autoremove -y -qq && sudo apt-get clean
          docker system prune -af
          echo "Free space:" && df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || 'docker' }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
