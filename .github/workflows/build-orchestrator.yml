name: Build orchestrator

on:
  push:
    branches: [main]
    paths:
      - 'docker/all-in-one/orchestrator/**'
      - '.github/workflows/build-orchestrator.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push babelcast-orchestrator
        uses: docker/build-push-action@v6
        with:
          context: docker/all-in-one/orchestrator
          file: docker/all-in-one/orchestrator/Dockerfile
          push: true
          tags: |
            marcosremar/babelcast-orchestrator:latest
            marcosremar/babelcast-orchestrator:${{ github.sha }}
          cache-from: type=gha,scope=babelcast-orchestrator
          cache-to: type=gha,mode=max,scope=babelcast-orchestrator
