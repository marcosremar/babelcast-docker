worker_processes 1;
events { worker_connections 64; }

http {
    # Orchestrator (FastAPI) on :8081
    # Bot (Node.js) on :8082

    upstream orchestrator { server 127.0.0.1:8081; }
    upstream bot           { server 127.0.0.1:8082; }

    server {
        listen 8080;
        server_name _;

        # Orchestrator routes (gateway interactions)
        location = /health       { proxy_pass http://orchestrator; }
        location = /transcripts  { proxy_pass http://orchestrator; }
        location = /join         { proxy_pass http://orchestrator; }
        location = /stop_record  { proxy_pass http://orchestrator; }

        # WebSocket: bot audio bridge
        location = /ws/audio {
            proxy_pass http://orchestrator;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # Everything else → bot (version, upload, play, etc.)
        location / {
            proxy_pass http://bot;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
